# windows-server-2025-vm.yaml — Reference VirtualMachine spec for Windows Server 2025
# Source: Merged from official `windows2k25-server-medium` OpenShift template + custom multi-disk layout
# Replace {{variables}} or use the script instead.

# === CONFIGURABLE PARAMETERS ===
# vm.name:             The VirtualMachine name
# vm.namespace:        Target namespace
# vm.instancetype:     KubeVirt instance type (u1.large = 2 vCPU, 8Gi RAM)
# vm.data_size:        Blank data disk size (guest OS target)
# vm.storage_class:    StorageClass for both volumes
# vm.network_ns:       NetworkAttachmentDef namespace
# vm.network_name:     NetworkAttachmentDef name
# vm.uuid:             Unique firmware UUID (auto-generated by script)
# vm.serial:           Unique firmware serial (auto-generated by script)

apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: {{vm.name}}
  namespace: {{vm.namespace}}
  labels:
    app: {{vm.name}}
    app.kubernetes.io/name: {{vm.name}}
    app.kubernetes.io/component: windows-vm
    app.kubernetes.io/template: windows-server-2025
    vm.kubevirt.io/template: windows-server-2025-custom
spec:
  instancetype:
    name: {{vm.instancetype}}
  preference:
    kind: VirtualMachineClusterPreference
    name: windows.2k25.virtio
  runStrategy: RerunOnFailure

  dataVolumeTemplates:
    # Boot volume — cloned from the Windows Server 2025 DataSource
    - metadata:
        name: {{vm.name}}-boot
      spec:
        sourceRef:
          kind: DataSource
          name: windows-server-2025
          namespace: openshift-virtualization-os-images
        storage:
          resources:
            requests:
              storage: 30Gi
          storageClassName: {{vm.storage_class}}

    # Data disk — blank volume where Windows is installed
    - metadata:
        name: {{vm.name}}-data
      spec:
        source:
          blank: {}
        storage:
          resources:
            requests:
              storage: {{vm.data_size}}
          storageClassName: {{vm.storage_class}}

    # VirtIO drivers ISO — cloned from shared DataSource
    - metadata:
        name: {{vm.name}}-virtio-win
      spec:
        sourceRef:
          kind: DataSource
          name: virtio-win-iso
          namespace: openshift-virtualization-os-images
        storage:
          resources:
            requests:
              storage: 1Gi
          storageClassName: {{vm.storage_class}}

  template:
    metadata:
      annotations:
        kubevirt.io/pci-topology-version: v3
        vm.kubevirt.io/flavor: medium
        vm.kubevirt.io/os: windows2k25
        vm.kubevirt.io/workload: server
      labels:
        kubevirt.io/domain: {{vm.name}}
        network.kubevirt.io/headlessService: headless
    spec:
      architecture: amd64
      subdomain: headless

      domain:
        clock:
          timer:
            hpet:
              present: false
            hyperv: {}
            pit:
              tickPolicy: delay
            rtc:
              tickPolicy: catchup
          utc: {}
        devices:
          autoattachPodInterface: false
          disks:
            - bootOrder: 1
              disk:
                bus: virtio
              name: os-disk
            - bootOrder: 2
              cdrom:
                bus: sata
              name: windows-iso
            - cdrom:
                bus: sata
              name: virtio-win-iso
          inputs:
            - bus: usb
              name: tablet
              type: tablet
          interfaces:
            - bridge: {}
              model: virtio
              name: default
              state: up
          tpm:
            persistent: true
        features:
          acpi: {}
          apic: {}
          hyperv:
            reenlightenment: {}
            ipi: {}
            synic: {}
            synictimer:
              direct: {}
            spinlocks:
              spinlocks: 8191
            reset: {}
            relaxed: {}
            vpindex: {}
            runtime: {}
            tlbflush: {}
            frequencies: {}
            vapic: {}
          smm: {}
        firmware:
          uuid: {{vm.uuid}}
          serial: {{vm.serial}}
          bootloader:
            efi:
              persistent: true
              secureBoot: true

      networks:
        - multus:
            networkName: {{vm.network_ns}}/{{vm.network_name}}
          name: default

      terminationGracePeriodSeconds: 3600

      volumes:
        - dataVolume:
            name: {{vm.name}}-boot
          name: windows-iso
        - dataVolume:
            name: {{vm.name}}-data
          name: os-disk
        - dataVolume:
            name: {{vm.name}}-virtio-win
          name: virtio-win-iso
