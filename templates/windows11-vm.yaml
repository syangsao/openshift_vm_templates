# windows11-vm.yaml — Reference VirtualMachine spec for Windows 11
# Source: Generated by ./scripts/create-vm.sh or hand-tuned for documentation
# Replace {{variables}} or use the script instead.

# === CONFIGURABLE PARAMETERS ===
# vm.name:             The VirtualMachine name
# vm.namespace:        Target namespace
# vm.instancetype:     KubeVirt instance type (u1.large = 2 vCPU, 8Gi RAM)
# vm.data_size:        Blank data disk size (guest OS target)
# vm.storage_class:    StorageClass for both volumes
# vm.network_ns:       NetworkAttachmentDef namespace
# vm.network_name:     NetworkAttachmentDef name
# vm.mac:              Static MAC (optional, auto-generated by script)
# vm.uuid:             Unique firmware UUID (auto-generated by script)
# vm.serial:           Unique firmware serial (auto-generated by script)

apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: {{vm.name}}
  namespace: {{vm.namespace}}
  labels:
    app.kubernetes.io/name: {{vm.name}}
    app.kubernetes.io/component: windows-vm
    app.kubernetes.io/template: windows11
spec:
  instancetype:
    name: {{vm.instancetype}}
  preference:
    kind: VirtualMachineClusterPreference
    name: windows.11.virtio
  runStrategy: RerunOnFailure

  dataVolumeTemplates:
    # Boot volume — cloned from the Windows 11 25H2 DataSource
    - metadata:
        name: {{vm.name}}-boot
      spec:
        sourceRef:
          kind: DataSource
          name: windows-11-25h2-amd64
          namespace: openshift-virtualization-os-images
        storage:
          resources:
            requests:
              storage: 30Gi
          storageClassName: {{vm.storage_class}}

    # Data disk — blank volume where Windows is installed
    - metadata:
        name: {{vm.name}}-data
      spec:
        source:
          blank: {}
        storage:
          resources:
            requests:
              storage: {{vm.data_size}}
          storageClassName: {{vm.storage_class}}

  template:
    metadata:
      annotations:
        kubevirt.io/pci-topology-version: v3
      labels:
        network.kubevirt.io/headlessService: headless
    spec:
      architecture: amd64
      subdomain: headless

      domain:
        devices:
          autoattachPodInterface: false
          disks:
            - bootOrder: 1
              name: rootdisk
            - bootOrder: 2
              cdrom:
                bus: sata
              name: cdrom-iso
            - cdrom:
                bus: sata
              name: windows-drivers-disk
          interfaces:
            - bridge: {}
              macAddress: {{vm.mac}}
              model: virtio
              name: default
              state: up

        firmware:
          uuid: {{vm.uuid}}
          serial: {{vm.serial}}

        machine:
          type: pc-q35-rhel9.8.0

      networks:
        - multus:
            networkName: {{vm.network_ns}}/{{vm.network_name}}
          name: default

      volumes:
        - dataVolume:
            name: {{vm.name}}-boot
          name: cdrom-iso
        - dataVolume:
            name: {{vm.name}}-data
          name: rootdisk
        - containerDisk:
            image: registry.redhat.io/container-native-virtualization/virtio-win-rhel9@sha256:7e06e1f52a434d4602657c920144504fbaed955d0998535bdf345716355ce83a
          name: windows-drivers-disk
