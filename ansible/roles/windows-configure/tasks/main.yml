---
# =============================================================================
# Windows Configure Role — Post-install via WinRM
# =============================================================================

- name: Wait for WinRM to be available
  ansible.builtin.wait_for:
    port: 5985
    host: "{{ inventory_hostname }}"
    timeout: 300
    delay: 30

- name: Verify Windows version
  ansible.windows.win_shell: '$PSVersionTable.PSVersion'
  register: ps_version

- name: Get system information
  ansible.windows.win_shell: |
    Get-ComputerInfo | Select-Object CsName, WindowsProductName, OsVersion, OsBuildNumber
  register: system_info

- name: Install virtio drivers if not already installed
  ansible.windows.win_shell: |
    $drives = Get-Volume | Where-Object {$_.DriveType -eq 'CD-ROM'} | ForEach-Object {$_.DriveLetter + ':'}
    foreach($d in $drives) {
      $setup = Get-ChildItem "$d" -Filter 'virtio-win-gt-x64.exe' -ErrorAction SilentlyContinue
      if($setup) {
        & $setup.FullName '/S'
        break
      }
    }
  ignore_errors: yes

- name: Check for Windows Updates
  ansible.windows.win_updates:
    state: searched
  register: update_search

- name: Install available updates
  ansible.windows.win_updates:
    state: installed
  when: update_search.RebootNeeded | default(false) | bool or update_search.UpdatesFound | default([]) | length > 0

- name: Reboot if updates require it
  ansible.windows.win_reboot:
    post_reboot_delay: 120
  when: update_search.RebootNeeded | default(false) | bool

- name: Configure power plan for performance
  ansible.windows.win_shell: |
    powercfg -setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c

- name: Disable hibernation
  ansible.windows.win_shell: |
    powercfg -h off

- name: Create log directory
  ansible.windows.win_file:
    path: 'C:/logs'
    state: directory

- name: Gather network configuration
  ansible.windows.win_shell: |
    Get-NetAdapter | Where-Object {$_.Status -eq 'Up'} | Select-Object Name, MacAddress, InterfaceDescription | Format-List
  register: network_info

- name: Display final configuration
  ansible.builtin.debug:
    msg: |
      Windows VM Configuration Complete
      ================================
      Computer: {{ windows_computer_name }}
      PS Version: {{ ps_version.stdout }}
      System: {{ system_info.stdout }}
      Network: {{ network_info.stdout }}
